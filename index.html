<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kütüphane Takip</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);
      -webkit-text-size-adjust:100%;
      touch-action:manipulation;
    }

    body{
      padding:14px;
    }

    .app{
      width:100%;
      max-width:100vw;
      overflow-x:hidden;
      margin:0 auto;
    }

    .header{
      background:#F28400;
      color:white;
      padding:clamp(14px,4vw,22px);
      border-radius:20px;
      font-size:clamp(22px,6vw,30px);
      font-weight:bold;
      margin-bottom:14px;
      text-align:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }

    .subInfo{
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      margin-bottom:18px;
      text-align:left;
      font-size:clamp(13px,3.6vw,16px);
      line-height:1.5;
      color:#444;
      box-shadow:0 3px 10px rgba(0,0,0,0.06);
      word-break:break-word;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .menuBtn{
      min-width:0;
      width:100%;
      aspect-ratio:1/1;
      border:none;
      border-radius:22px;
      background:white;
      color:#333;
      font-size:clamp(18px,4.8vw,24px);
      font-weight:bold;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
      padding:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .icon{
      font-size:clamp(64px,18vw,100px);
      line-height:1;
      margin-bottom:8px;
    }

    .menuText{
      text-align:center;
      line-height:1.2;
      word-break:break-word;
    }

    .listBtn{
      width:100%;
      margin-top:16px;
      padding:clamp(18px,5vw,26px);
      border:none;
      border-radius:22px;
      background:#2d3748;
      color:white;
      font-size:clamp(22px,5.5vw,30px);
      font-weight:bold;
      line-height:1.35;
      box-shadow:0 6px 14px rgba(0,0,0,0.18);
      cursor:pointer;
    }

    #formAlani{
      display:none;
      width:100%;
      margin-top:22px;
      background:white;
      padding:clamp(18px,4vw,24px);
      border-radius:22px;
      text-align:left;
      box-shadow:0 6px 16px rgba(0,0,0,0.10);
      overflow:hidden;
    }

    .formTitle{
      font-size:clamp(24px,6vw,30px);
      font-weight:bold;
      margin-bottom:18px;
      text-align:center;
      color:#222;
    }

    .formLabel{
      display:block;
      font-size:clamp(18px,4.8vw,22px);
      font-weight:bold;
      margin:16px 0 8px 0;
      color:#333;
    }

    input, textarea{
      width:100%;
      max-width:100%;
      padding:16px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:14px;
      background:white;
      appearance:none;
      -webkit-appearance:none;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .actionBtn{
      width:100%;
      padding:18px;
      margin-top:18px;
      font-size:clamp(22px,5vw,28px);
      border:none;
      border-radius:14px;
      background:#111;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .blueBtn{ background:#0b57d0; }
    .greenBtn{ background:#047857; }
    .grayBtn{ background:#6b7280; }
    .secondaryBtn{ background:#444; }
    .dangerBtn{ background:#991b1b; }

    .mesajKutusu{
      display:none;
      margin-top:18px;
      padding:16px 18px;
      border-radius:14px;
      font-size:20px;
      font-weight:bold;
    }

    .mesaj-success{
      display:block;
      background:#d1fae5;
      color:#065f46;
    }

    .mesaj-error{
      display:block;
      background:#fee2e2;
      color:#991b1b;
    }

    .mesaj-warn{
      display:block;
      background:#ffedd5;
      color:#9a3412;
    }

    .scannerWrap{
      display:none;
      margin-top:16px;
      border-radius:18px;
      overflow:hidden;
      background:#111;
      padding:10px;
    }

    #reader{
      width:100%;
      min-height:260px;
      border-radius:12px;
      overflow:hidden;
      background:#000;
    }

    .scanHelp{
      margin-top:10px;
      color:#fff;
      background:rgba(255,255,255,0.08);
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
    }

    .topActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .linkLike{
      display:block;
      width:100%;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">📚 Kütüphane Takip</div>
    <div id="subInfo" class="subInfo">Cloudflare Worker + D1 aktif</div>

    <div class="grid">
      <button class="menuBtn" onclick="ekleForm()">
        <div class="icon">➕</div>
        <div class="menuText">Kitap Ekle</div>
      </button>

      <button class="menuBtn" onclick="oduncVerForm()">
        <div class="icon">📤</div>
        <div class="menuText">Ödünç Ver</div>
      </button>

      <button class="menuBtn" onclick="iadeForm()">
        <div class="icon">📥</div>
        <div class="menuText">İade Al</div>
      </button>

      <button class="menuBtn" onclick="silForm()">
        <div class="icon">🗑️</div>
        <div class="menuText">Kitap Sil</div>
      </button>
    </div>

    <a class="linkLike" href="./liste.html?v=20">
      <button class="listBtn">📚<br>Kitap Listesi</button>
    </a>

    <div id="formAlani"></div>
  </div>

  <script>
    const API_URL = 'https://little-heart-9411.sedasahingultekin.workers.dev';
  </script>
</body>
</html>
