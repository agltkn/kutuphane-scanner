<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Kütüphane Kitap Listesi</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 14px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      background: #111;
      color: #fff;
      padding: 18px;
      border-radius: 18px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 14px;
    }

    .homeBtn {
      display: block;
      width: 100%;
      text-decoration: none;
      margin-bottom: 14px;
    }

    .homeBtn button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      background: #F28400;
      color: #fff;
      cursor: pointer;
    }

    .toolbar {
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .line {
      font-size: 16px;
      margin: 4px 0;
    }

    .status {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .rafta {
      background: #d1fae5;
      color: #065f46;
    }

    .oduncte {
      background: #fee2e2;
      color: #991b1b;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      width: 100%;
    }

    .btnLoan { background: #0b57d0; }
    .btnReturn { background: #047857; }
    .btnDisabled { background: #9ca3af; }

    .empty {
      text-align: center;
      color: #666;
      padding: 30px;
      font-size: 18px;
      background: #fff;
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">📚 Kitap Listesi</div>

    <a class="homeBtn" href="./?v=12">
      <button>🏠 Ana Ekrana Dön</button>
    </a>

    <div class="toolbar">
      <input type="text" placeholder="Kitap adı, yazar veya ISBN ara..." />
    </div>

    <div class="list">
      <div class="empty">Liste yeni sürüm için hazırlandı</div>
    </div>
  </div>
</body>
</html>
